name: test ftp deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: web
        run: rm package-lock.json && npm install --silent

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Install API dependencies
        working-directory: api
        run: composer install --no-dev --prefer-dist --no-progress --quiet --optimize-autoloader

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy

          # Runtime-only API copy: strip env files, dev artifacts, and vendor tests/docs
          rsync -a \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.example' \
            --exclude='storage/logs/*' \
            --exclude='/tests' \
            --exclude='/phpunit.xml' \
            --exclude='/phpunit.xml.dist' \
            --exclude='/.phpunit.cache' \
            --exclude='/schema.sql' \
            --exclude='*.log' \
            --exclude='vendor/**/tests' \
            --exclude='vendor/**/test' \
            --exclude='vendor/**/Tests' \
            --exclude='vendor/**/docs' \
            --exclude='vendor/**/doc' \
            --exclude='vendor/**/examples' \
            --exclude='vendor/**/example' \
            --exclude='vendor/**/.github' \
            --exclude='vendor/**/.gitignore' \
            --exclude='vendor/**/.gitattributes' \
            --exclude='vendor/**/README*' \
            --exclude='vendor/**/CHANGELOG*' \
            --exclude='vendor/**/UPGRADE*' \
            --exclude='vendor/**/UPGRADING*' \
            --exclude='vendor/**/CONTRIBUTING*' \
            --exclude='vendor/**/CODE_OF_CONDUCT*' \
            --exclude='vendor/**/SECURITY*' \
            --exclude='vendor/**/phpunit.xml*' \
            --exclude='vendor/**/phpcs.xml*' \
            --exclude='vendor/**/.editorconfig' \
            --exclude='vendor/**/.travis*' \
            --exclude='vendor/**/.scrutinizer*' \
            --exclude='vendor/**/Makefile' \
            api/ deploy/api/

          # Copy built frontend
          cp -r web/dist/* deploy/

          # Copy .htaccess for SPA routing
          cp .htaccess deploy/.htaccess

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TEST_FTP_SERVER }}
          port: ${{ secrets.TEST_FTP_PORT || '21' }}
          username: ${{ secrets.TEST_FTP_USERNAME }}
          password: ${{ secrets.TEST_FTP_PASSWORD }}
          protocol: ftp
          security: loose
          log-level: minimal
          local-dir: ./deploy/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.local
            **/storage/logs/**

  unit-tests:
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --prefer-dist --no-progress --quiet

      - name: Run PHPUnit tests
        working-directory: api
        run: ./vendor/bin/phpunit --testdox

      - name: Run database migrations
        working-directory: api
        env:
          DB_HOST: ${{ secrets.TEST_DB_HOST }}
          DB_PORT: ${{ secrets.TEST_DB_PORT || '3306' }}
          DB_DATABASE: ${{ secrets.TEST_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        run: ./vendor/bin/phinx migrate -e production
