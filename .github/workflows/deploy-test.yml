name: Deploy to TEST Server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-test
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: web
        run: rm package-lock.json && npm install --silent

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Install API dependencies
        working-directory: api
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Verify API vendor
        run: |
          ls -la api/vendor/composer/
          head -20 api/vendor/composer/autoload_psr4.php

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy

          # Copy API files (excluding sensitive files)
          rsync -a --exclude='.env' --exclude='.env.local' --exclude='storage/logs/*' api/ deploy/api/

          # Copy built frontend
          cp -r web/dist/* deploy/

          # Copy .htaccess for SPA routing
          cp .htaccess deploy/.htaccess

      - name: Verify deployment structure
        run: |
          echo "=== Deploy API structure ==="
          ls -la deploy/api/
          echo "=== Vendor autoload ==="
          ls deploy/api/vendor/autoload.php && echo "autoload.php exists"

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TEST_FTP_SERVER }}
          port: ${{ secrets.TEST_FTP_PORT || '21' }}
          username: ${{ secrets.TEST_FTP_USERNAME }}
          password: ${{ secrets.TEST_FTP_PASSWORD }}
          protocol: ftp
          security: loose
          log-level: minimal
          local-dir: ./deploy/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.local
            **/storage/logs/**

  unit-tests:
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --prefer-dist --no-progress --quiet

      - name: Run PHPUnit tests
        working-directory: api
        run: ./vendor/bin/phpunit --testdox

      # - name: Run database migrations
