name: Deploy to TEST Server

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment to TEST'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-test
      cancel-in-progress: false
    if: github.event_name == 'release' || github.event.inputs.confirm == 'deploy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy

          # Copy API files (excluding sensitive files)
          rsync -av --exclude='.env' --exclude='.env.local' --exclude='storage/logs/*' api/ deploy/api/

          # Copy built frontend
          cp -r web/dist/* deploy/

          # Create .htaccess for SPA routing if not exists in dist
          if [ ! -f deploy/.htaccess ]; then
            cat > deploy/.htaccess << 'EOF'
RewriteEngine On
RewriteBase /

# Redirect to API
RewriteRule ^api/(.*)$ api/index.php [QSA,L]

# Handle Vue SPA routing
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^(?!api/).*$ index.html [L]
EOF
          fi

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT || '21' }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: /fajnuklid/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.local
            **/storage/logs/**

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            cd /fajnuklid/api
            php vendor/bin/phinx migrate -e production
