name: Deploy to TEST Server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-test
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: web
        run: rm package-lock.json && npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy

          # Copy API files (excluding sensitive files)
          rsync -av --exclude='.env' --exclude='.env.local' --exclude='storage/logs/*' api/ deploy/api/

          # Copy built frontend
          cp -r web/dist/* deploy/

          # Copy .htaccess for SPA routing
          cp .htaccess deploy/.htaccess

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TEST_FTP_SERVER }}
          port: ${{ secrets.TEST_FTP_PORT || '21' }}
          username: ${{ secrets.TEST_FTP_USERNAME }}
          password: ${{ secrets.TEST_FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./deploy/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.local
            **/storage/logs/**

